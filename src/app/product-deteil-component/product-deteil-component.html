<div class="product">
  @if (product) {
    <h2 class="product-name">{{ product.name }}</h2>
    <div class="product-deteils">
      <h3>Produkt Details:</h3>
      <ul>
        @for (detail of details; track $index) {
          <li>{{ detail }}</li>
        }
      </ul>
    </div>
    <div class="product-img"><img src="{{ product.image }}" alt="product image"/></div>
    <p class="product-price">Preis: {{ product.price }} CHF</p>
    <div class="product-button">
      <button (click)="AddToCart(product)">Zum Warenkorb hinzufügen</button>
    </div>
  }
</div>
